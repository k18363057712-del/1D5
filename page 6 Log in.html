		<div class="lianxi-box">
			<form>
		    <div class="form-group">
		        <label for="username">Username</label>
		        <div class="input-group mb-2">
		            <div class="input-group-prepend">
		                <span class="input-group-text"><i class="fas fa-user"></i></span>
		            </div>
		            <input type="text" class="form-control" id="username" placeholder="Enter username">
		        </div>
		    </div>
		    <div class="form-group">
		        <label for="password">Password</label>
		        <div class="input-group mb-2">
		            <div class="input-group-prepend">
		                <span class="input-group-text"><i class="fas fa-lock"></i></span>
		            </div>
		            <input type="password" class="form-control" id="password" placeholder="Enter password">
		        </div>
		    </div>
		    <div class="form-check">
		        <input class="form-check-input" type="checkbox" id="autoLogin">
		        <label class="form-check-label" for="autoLogin">Auto login</label>
		    </div>
		    <div class="form-check">
		        <input class="form-check-input" type="checkbox" id="rememberMe">
		        <label class="form-check-label" for="rememberMe">Remember password</label>
		    </div>
		    <button type="submit" class="btn btn-success rounded btn-lg btn-block mt-4">Secure login</button>
		    <div class="footer1 d-flex justify-content-between mt-3">
		        <a href="#">Register an account   
</a>
